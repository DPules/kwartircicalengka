<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pendaftaran Kegiatan Pramuka</title>

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- FORM -->
    <section class="form-page">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="form-card">
              <!-- LOGO -->
              <div class="text-center mb-4">
                <img src="img/pngegg.png" width="110" class="mb-3" />

                <h1>Pendaftaran Kegiatan</h1>

                <p>Kwartir Ranting Cicalengka</p>
              </div>

              <!-- FORM -->
              <form id="formPendaftaran">
                <!-- NAMA -->
                <div class="mb-3">
                  <label class="form-label">
                    Nama Barung / Regu / Satuan
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    placeholder="Masukkan nama Barung / Regu / Satuan"
                    required
                  />
                </div>

                <!-- SEKOLAH -->
                <div class="mb-3">
                  <label class="form-label"> Asal Sekolah / Gudep </label>

                  <input
                    type="text"
                    class="form-control"
                    placeholder="Contoh: SMPN 1 Cicalengka"
                    required
                  />
                </div>

                <!-- GOLONGAN -->
                <div class="mb-3">
                  <label class="form-label"> Golongan </label>

                  <select class="form-select" required>
                    <option value="">Pilih Golongan</option>

                    <option>Siaga</option>

                    <option>Penggalang</option>

                    <option>Penegak</option>

                    <option>Pandega</option>
                  </select>
                </div>

                <!-- JK -->
                <div class="mb-3">
                  <label class="form-label"> Jenis Kelamin </label>

                  <select class="form-select" required>
                    <option value="">Pilih Jenis Kelamin</option>

                    <option>Laki-laki</option>

                    <option>Perempuan</option>
                  </select>
                </div>

                <!-- WA -->
                <div class="mb-3">
                  <label class="form-label"> Nomor WhatsApp </label>

                  <input
                    type="number"
                    class="form-control"
                    placeholder="08xxxxxxxxxx"
                    required
                  />
                </div>

                <!-- KEGIATAN -->
                <div class="mb-4">
                  <label class="form-label"> Pilih Kegiatan </label>

                  <select class="form-select" required>
                    <option value="">Pilih Kegiatan</option>

                    <option>Jambore</option>

                    <option>Raimuna</option>

                    <option>Pesta Siaga</option>
                  </select>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn btn-daftar w-100">
                  Daftar Sekarang
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
